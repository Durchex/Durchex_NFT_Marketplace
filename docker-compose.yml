services:
  mongodb:
    # `mongo:6.0-alpine` is no longer published on Docker Hub.
    # Keep Mongo 6, but use the supported Ubuntu-based tag instead.
    image: mongo:6.0-jammy
    container_name: durchex-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-durchex}
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - durchex-network
    healthcheck:
      test: ["CMD-SHELL", "mongosh --host localhost --port 27017 --username ${MONGO_USER:-admin} --password ${MONGO_PASSWORD:-changeme} --authenticationDatabase admin --quiet --eval \"db.runCommand({ ping: 1 }).ok\" | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: durchex-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    networks:
      - durchex-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-redis123} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  ipfs:
    image: ipfs/kubo:latest
    container_name: durchex-ipfs
    restart: unless-stopped
    ports:
      - "4001:4001"
      - "4001:4001/udp"
      - "127.0.0.1:5001:5001"
      - "127.0.0.1:8080:8080"
    volumes:
      - ipfs_data:/data/ipfs
    networks:
      - durchex-network
    environment:
      LIBP2P_FORCE_PNET: 0

  backend:
    build:
      context: ./backend_temp
      dockerfile: Dockerfile
    container_name: durchex-backend
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      DATABASE: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-changeme}@mongodb:27017/${MONGO_DB:-durchex}?authSource=admin
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-changeme}@mongodb:27017/${MONGO_DB:-durchex}?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      IPFS_API_URL: http://ipfs:5001
      IPFS_GATEWAY_URL: http://ipfs:8080
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      ETHEREUM_RPC_URL: ${ETHEREUM_RPC_URL:-}
      PRIVATE_KEY: ${PRIVATE_KEY:-}
      CONTRACT_ADDRESSES: ${CONTRACT_ADDRESSES:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      ETHERSCAN_API_KEY: ${ETHERSCAN_API_KEY:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      ipfs:
        condition: service_started
    networks:
      - durchex-network
    labels:
      - "com.durchex.service=backend"
      - "com.durchex.version=${BACKEND_VERSION:-1.0.0}"

  nginx:
    image: nginx:alpine
    container_name: durchex-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - durchex-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongo_data:
    driver: local
  mongo_config:
    driver: local
  redis_data:
    driver: local
  ipfs_data:
    driver: local

networks:
  durchex-network:
    driver: bridge
